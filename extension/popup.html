<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; width: 320px; margin: 0; padding: 12px; background:#111; color:#fff; }
    h3 { margin: 0 0 10px 0; font-size: 16px; }
    .row { margin-bottom: 10px; }
    button { width: 100%; padding: 9px; border: 0; border-radius: 8px; cursor: pointer; font-weight: 600; }
    #saveBtn { background:#0A84FF; color:#fff; }
    #refreshBtn { background:#2a2a2a; color:#fff; }
    .wf { margin-top: 8px; }
    .wf button { background:#1f1f1f; color:#fff; border:1px solid #333; margin-bottom:6px; }
    #msg { margin-top: 8px; font-size: 12px; color:#9ad; min-height: 16px; }
  </style>
</head>
<body>
  <h3>Elvar Companion</h3>
  <div class="row"><button id="saveBtn">Save Current Window Tabs</button></div>
  <div class="row"><button id="refreshBtn">Refresh Workflows</button></div>
  <div id="wfList" class="wf"></div>
  <div id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
